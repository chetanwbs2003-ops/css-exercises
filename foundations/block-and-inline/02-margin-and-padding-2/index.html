<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin and Padding exercise 2</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="card">
      <h1 class="title">I'm a card</h1>
      <div class="content">I have content inside me..lorem ipsum blah blah blah. Here's some stuff you need to read.</div>
      <div class="button-container">and a <button>BIG BUTTON</button></div>
    </div>
  <marquee 
      behavior="scroll" 
      direction="down" 
      scrollamount="20"
      height="50px" 
      width="75px"
      style="background-color: lightblue; color: white; font-size: 20px; text-align: center; margin-top: auto;"> 
  <p>G  O  L</p>

  <p>O  L  A</p>
  
  <p>L  A  G</p>

  <p>A  G  O</p>

  </marquee>

  <marquee 
      behavior="scroll" 
      direction="up" 
      scrollamount="20"
      height="50px" 
      width="75px"
      style="background-color: lightblue; color: white; font-size: 20px; text-align: center; margin-top: auto;"> 
  <p>G  O  L</p>

  <p>O  L  A</p>
  
  <p>L  A  G</p>

  <p>A  G  O</p>
  </body>
</html>
